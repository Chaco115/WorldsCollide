<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Worlds Collide - War Unfolding</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #050505; /* MUCH darker */
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    /* Subtle dark smoke (no bright colors) */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.03), transparent 70%);
        animation: drift 20s linear infinite;
    }

    @keyframes drift {
        0% { transform: translate(-10%, -10%); }
        100% { transform: translate(10%, 10%); }
    }

    .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 75%;
        z-index: 2;
    }

    h1 {
        font-size: 3em;
        letter-spacing: 6px;
        margin-bottom: 10px;
        text-shadow: 0 0 15px rgba(255,255,255,0.25);
    }

    .subtitle {
        opacity: 0.6;
        margin-bottom: 30px;
    }

    .eventText {
        font-size: 1.2em;
        margin-bottom: 25px;
        color: #ff4d4d;
        min-height: 24px;
        text-shadow: 0 0 10px rgba(255,0,0,0.3);
        transition: opacity 0.5s;
    }

    .progress-bar {
        width: 100%;
        height: 22px;
        background: rgba(255,255,255,0.05);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    .progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff2a2a, #ff9900);
        transition: width 0.2s;
    }

    .status {
        margin-top: 12px;
        font-size: 0.95em;
        opacity: 0.75;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Worlds Collide</h1>
    <div class="subtitle">The war doesn’t wait for anyone...</div>

    <div class="eventText" id="eventText">The city is holding its breath...</div>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="status" id="status">Preparing battlefield...</div>
</div>

<script>
    const events = [
        "⚔️ Gunfire echoes between rival factions...",
        "🏃 Civilians scatter as fighting reaches the streets...",
        "💀 Mercenaries push into contested zones...",
        "🔥 Fires spread — no side is winning...",
        "🛡️ Enforcers struggle to hold the line...",
        "😨 Civilians hide and pray it ends...",
        "💥 Explosions tear through the silence...",
        "🕶️ Chaos creates new opportunities...",
        "🩸 Survival is no longer guaranteed..."
    ];

    let i = 0;
    setInterval(() => {
        const text = document.getElementById("eventText");
        text.style.opacity = 0;

        setTimeout(() => {
            text.innerText = events[i];
            text.style.opacity = 1;
            i = (i + 1) % events.length;
        }, 400);
    }, 3500);

    function GameDetails(servername) {
        document.getElementById("status").innerText = "Deploying to: " + servername;
    }

    function SetStatusChanged(status) {
        document.getElementById("status").innerText = status;
    }

    function DownloadingFile(fileName) {
        document.getElementById("status").innerText = "Receiving assets: " + fileName;
    }

    function SetFilesTotal(total) {
        window.totalFiles = total;
    }

    function SetFilesNeeded(needed) {
        let progress = 0;
        if (window.totalFiles > 0) {
            progress = ((window.totalFiles - needed) / window.totalFiles) * 100;
        }
        document.getElementById("progress").style.width = progress + "%";
    }
</script>

</body>
</html>
