<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Worlds Collide — Service Time</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f1a;
        color: white;
    }

    /* HEADER */
    header {
        background: #070a14;
        border-bottom: 2px solid #00ffff;
        padding: 25px;
        text-align: center;
    }

    header h1 {
        margin: 0;
        font-size: 2.8rem;
        letter-spacing: 2px;
    }

    header p {
        margin-top: 8px;
        color: #cfcfcf;
    }

    nav {
        margin-top: 15px;
    }

    nav a {
        margin: 0 10px;
        padding: 10px 16px;
        border: 2px solid #00ffff;
        border-radius: 6px;
        text-decoration: none;
        color: #00ffff;
        font-weight: bold;
        transition: 0.2s;
        background: rgba(0,255,255,0.05);
    }

    nav a:hover {
        background: #00ffff;
        color: #000;
    }

    /* CONTAINER */
    .container {
        max-width: 900px;
        margin: auto;
        padding: 40px 20px;
        text-align: center;
    }

    /* TITLE */
    .section-title {
        font-size: 2rem;
        margin-bottom: 10px;
        color: #ffd700;
    }

    .subtitle {
        color: #cfcfcf;
        margin-bottom: 30px;
    }

    /* SERVICE CARDS */
    .services {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .service-card {
        background: #11162a;
        border: 2px solid #00ffff;
        border-radius: 10px;
        padding: 25px;
        transition: 0.2s;
    }

    .service-card:hover {
        transform: translateY(-4px);
        border-color: #ffd700;
        box-shadow: 0 0 15px rgba(0,255,255,0.2);
    }

    .service-card h3 {
        margin: 0;
        color: #00ffff;
        font-size: 1.5rem;
    }

    .time {
        font-size: 1.8rem;
        margin: 15px 0;
        color: #ffffff;
        font-weight: bold;
    }

    .desc {
        color: #cfcfcf;
        font-size: 0.95rem;
    }

    /* FOOTER */
    footer {
        text-align: center;
        padding: 25px;
        color: #777;
        border-top: 1px solid #222;
        margin-top: 50px;
    }
</style>
</head>

<body>

<header>
    <h1>SERVICE TIMES</h1>
    <p>Join us for Sunday gatherings and weekly services on the server!</p>

    <nav>
        <a href="index.html">Home</a>
        <a href="rules.html">Rules</a>
        <a href="staff.html">Staff</a>
    </nav>
</header>

<div class="container">

    <div class="section-title">Sunday Services</div>
    <div class="subtitle">All are welcome — come as you are</div>

        <div class="service-card">
            <h3>Evening Service</h3>
            <div class="time">6:00 PM</div>
            <div class="desc">Relaxed evening service with discussion and reflection.</div>
        </div>

    </div>

</div>

<footer>
    © 2026 Worlds Collide
</footer>

</body>
</html>
