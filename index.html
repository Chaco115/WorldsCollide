<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Worlds Collide</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #070b14;
        color: white;
    }

    header {
        background: #050816;
        padding: 30px;
        text-align: center;
        border-bottom: 2px solid #00ffff;
    }

    header h1 {
        margin: 0;
        font-size: 3rem;
        letter-spacing: 2px;
        color: #ffffff;
    }

    header p {
        margin-top: 8px;
        font-size: 1.2rem;
        color: #cccccc;
    }

    .buttons {
        margin-top: 30px;
    }

    .btn {
        display: inline-block;
        margin: 10px 12px;
        padding: 14px 26px;
        border: 2px solid #00ffff;
        border-radius: 8px;
        text-decoration: none;
        color: #00ffff;
        font-size: 1rem;
        font-weight: bold;
        transition: 0.2s;
        background: rgba(0,255,255,0.05);
    }

    .btn:hover {
        background: #00ffff;
        color: #000;
    }

    .btn.gold {
        border-color: #ffd700;
        color: #ffd700;
    }

    .btn.gold:hover {
        background: #ffd700;
        color: #000;
    }

    footer {
        text-align: center;
        padding: 25px;
        color: #888;
        border-top: 1px solid #222;
        margin-top: 50px;
        font-size: 0.9rem;
    }
</style>
</head>

<body>

<header>
    <h1>WORLD COLLIDE</h1>
    <p>Where worlds meet, rules matter, and your story begins.</p>

    <div class="buttons">

</footer>
