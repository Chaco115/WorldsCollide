<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Worlds Collide</title>

    <!-- Discord Embed -->
    <meta property="og:title" content="Worlds Collide">
    <meta property="og:description" content="Enter Worlds Collide – immersive RP and custom rules.">
    <meta property="og:image" content="https://chaco115.github.io/WorldsCollide/banner.png">
    <meta property="og:url" content="https://chaco115.github.io/WorldsCollide/">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #00bcd4, #0288d1);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
        }

        .logo {
            max-width: 300px;
            width: 90%;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3em;
            margin: 10px 0;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        p {
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }

        .btn-primary {
            background: white;
            color: #0288d1;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: #e0f7fa;
        }

        .btn-gold {
            background: #ffd54f;
            color: #333;
            font-weight: bold;
        }

        .btn-gold:hover {
            background: #ffca28;
        }

        footer {
            margin-top: 50px;
            opacity: 0.6;
            font-size: 14px;
        }

        /* Glow effect */
        .btn:hover {
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- LOGO -->
        <img src="Logo.png" alt="Worlds Collide Logo" class="logo">

        <h1>Worlds Collide</h1>
        <p>Where worlds meet, rules matter, and your story begins.</p>

        <!-- BUTTONS (EDIT LINKS ONLY) -->
        <a href="rules.html" class="btn btn-primary">View Rules</a>

        <a href="https://discord.gg/nn6TtQrCzU" class="btn btn-gold" target="_blank">
            Join Discord
        </a>

        <a href="staff.html" class="btn btn-primary">Staff Team</a>

    </div>

    <footer>
        © 2026 Worlds Collide
    </footer>

</body>
</html>
