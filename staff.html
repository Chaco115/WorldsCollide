<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worlds Collide — Staff Team</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f1a; /* dark background */
            color: #ffffff;
            text-align: center;
        }
        header {
            padding: 30px;
            background: #091026;
        }
        header h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 1px;
        }
        nav a {
            margin: 0 10px;
            color: #00ffff; /* cyan links */
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .staff-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 40px 20px;
        }
        .staff-card {
            background: #13162b;
            border: 2px solid #00ffff;
            border-radius: 8px;
            width: 250px;
            padding: 20px;
            text-align: center;
        }
        .staff-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffffff;
        }
        .staff-card h3 {
            margin: 15px 0 5px;
            font-size: 1.4rem;
            color: #ffffff;
        }
        .staff-card p {
            margin: 0;
            font-size: 1rem;
            color: #d0d0d0;
        }
        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h1>Worlds Collide — Staff Team</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="rules.html">Rules</a>
        <a href="https://discord.gg">Join Discord</a>
    </nav>
</header>

<section class="staff-container">

    <!-- Example Staff Member -->
    <div class="staff-card">
        <img src="staff-avatar1.png" alt="Staff Name">
        <h3>Vortigaunt</h3>
        <p>Founder</p>
    </div>

    <div class="staff-card">
        <img src="staff-avatar2.png" alt="Staff Name">
        <h3>empty</h3>
        <p>empty</p>
    </div>

    <!-- Add more staff cards below -->

    <div class="staff-card">
        <img src="staff-avatar3.png" alt="Staff Name">
        <h3>Staff Name</h3>
        <p>Role / Title</p>
    </div>
    -->

</section>

<footer>
    © 2026 Worlds Collide
</footer>

</body>
</html>
